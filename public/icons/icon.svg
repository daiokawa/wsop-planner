<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="80" fill="#0d1f0f"/>
  
  <!-- Spade symbol -->
  <g transform="translate(256, 220)">
    <!-- Top circle of spade -->
    <circle cx="0" cy="-60" r="85" fill="#d4af37"/>
    <!-- Left lobe -->
    <circle cx="-65" cy="20" r="80" fill="#d4af37"/>
    <!-- Right lobe -->
    <circle cx="65" cy="20" r="80" fill="#d4af37"/>
    <!-- Bottom triangle fill -->
    <polygon points="-80,10 80,10 0,-140" fill="#d4af37"/>
    <!-- Stem -->
    <rect x="-18" y="50" width="36" height="90" rx="4" fill="#d4af37"/>
    <!-- Base -->
    <ellipse cx="0" cy="140" rx="55" ry="16" fill="#d4af37"/>
  </g>
  
  <!-- "W" text -->
  <text x="256" y="460" text-anchor="middle" font-family="Georgia, serif" font-size="100" font-weight="bold" fill="#d4af37" letter-spacing="4">W</text>
</svg>
